        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="11"
        fill="#00ff41"
        fill-opacity="0.5"
        letter-spacing="1"
        filter="url(#subtle-glow)">root@hacklab:~#</text>

