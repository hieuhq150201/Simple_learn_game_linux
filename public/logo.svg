    <rect x="0" y="396" width="400" height="1" fill="#00ff41"/>
  </g>

  <!-- Hex border glow (outer) -->
  <polygon points="200,22 358,112 358,288 200,378 42,288 42,112"
           fill="none" stroke="#00ff41" stroke-width="3"
           filter="url(#glow)" opacity="0.7"/>

  <!-- Hex border sharp -->
  <polygon points="200,22 358,112 358,288 200,378 42,288 42,112"
           fill="none" stroke="#00ff41" stroke-width="1.5" opacity="0.9"/>

  <!-- Inner dashed hex ring -->
  <polygon points="200,50 332,125 332,275 200,350 68,275 68,125"
           fill="none" stroke="#00ff41" stroke-width="1"
           stroke-dasharray="6 5" class="pulse"/>

  <!-- Circuit traces — top-right -->
  <g filter="url(#subtle-glow)" stroke="#00ff41" stroke-width="1.5" fill="none" opacity="0.55">
    <path d="M 315 140 L 350 140 L 350 105"/>
    <circle cx="350" cy="101" r="3.5" fill="#00ff41"/>
    <path d="M 340 125 L 370 125" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Circuit traces — top-left -->
  <g filter="url(#subtle-glow)" stroke="#00ff41" stroke-width="1.5" fill="none" opacity="0.55">
    <path d="M 85 140 L 50 140 L 50 105"/>
    <circle cx="50" cy="101" r="3.5" fill="#00ff41"/>
    <path d="M 60 125 L 30 125" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Circuit traces — bottom -->
  <g filter="url(#subtle-glow)" stroke="#00ff41" stroke-width="1.5" fill="none" opacity="0.55">
    <path d="M 200 358 L 200 385 L 240 385"/>
    <circle cx="244" cy="385" r="3.5" fill="#00ff41"/>
  </g>

  <!-- Binary decoration — top-left area -->
  <g font-family="'Courier New', Courier, monospace" font-size="8" fill="#00ff41" fill-opacity="0.2" class="flicker">
    <text x="72" y="170">01101000</text>
    <text x="72" y="182">01100001</text>
    <text x="72" y="194">01100011</text>
    <text x="72" y="206">01101011</text>
  </g>

  <!-- Binary decoration — right area -->
  <g font-family="'Courier New', Courier, monospace" font-size="8" fill="#00ff41" fill-opacity="0.2" class="flicker">
