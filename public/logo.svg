<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      @keyframes flicker {
        0%, 95%, 100% { opacity: 1; }
        96% { opacity: 0.8; }
        97% { opacity: 1; }
        98% { opacity: 0.6; }
        99% { opacity: 1; }
      }
      @keyframes pulse-ring {
        0% { stroke-opacity: 0.15; }
        50% { stroke-opacity: 0.45; }
        100% { stroke-opacity: 0.15; }
      }
      .cursor { animation: blink 1s step-end infinite; }
      .flicker { animation: flicker 4s ease-in-out infinite; }
      .pulse { animation: pulse-ring 3s ease-in-out infinite; }
    </style>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strong-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtle-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <radialGradient id="bg-grad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#0a1a0a"/>
      <stop offset="100%" stop-color="#020602"/>
    </radialGradient>

    <pattern id="grid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#00ff41" stroke-width="0.3" stroke-opacity="0.08"/>
    </pattern>

    <clipPath id="hex-clip">
      <polygon points="200,22 358,112 358,288 200,378 42,288 42,112"/>
    </clipPath>
  </defs>

  <!-- Outer shadow hex -->
  <polygon points="200,22 358,112 358,288 200,378 42,288 42,112"
           fill="none" stroke="#00ff41" stroke-width="12" stroke-opacity="0.08"/>

  <!-- Background fill -->
  <polygon points="200,22 358,112 358,288 200,378 42,288 42,112"
           fill="url(#bg-grad)"/>

  <!-- Grid overlay clipped to hex -->
  <rect x="0" y="0" width="400" height="400" fill="url(#grid)" clip-path="url(#hex-clip)"/>

  <!-- Scanlines clipped to hex -->
